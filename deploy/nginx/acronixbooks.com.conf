# nginx site for the Acronix Books marketing website (static export).
# Install at /etc/nginx/sites-available/acronixbooks.com and symlink into
# sites-enabled. This is an HTTP-only base; `certbot --nginx` adds the TLS
# listener and the HTTP->HTTPS redirect (see docs/deploy.md), exactly as the
# sync.acronixbooks.com site was set up.
#
# Isolation: this block owns only acronixbooks.com / www and its two web roots.
# It never references the sync server, acronix.in, or the whatsapp services.

server {
    listen 80;
    listen [::]:80;
    server_name acronixbooks.com www.acronixbooks.com;

    # The site deploy (GitHub Actions) rsyncs client/out/ here with --delete.
    root /var/www/acronixbooks.com;
    index index.html;

    # Compress text assets. `gzip on` is global (nginx.conf) but Ubuntu's default
    # gzip_types is text/html only, so JS/CSS shipped UNCOMPRESSED — a fresh
    # visitor downloaded ~730KB of raw JS, delaying nav hydration (the mega-menu
    # stayed inert until it finished). Scoped to this server block; ~70% smaller.
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml font/woff2 application/manifest+json;

    # Desktop installer + electron-updater feed. A SEPARATE directory, outside
    # the site root, so a site redeploy's --delete can never wipe the installer
    # or latest.yml. The site build does not produce these — they are uploaded
    # from the desktop release pipeline. Until the first installer is uploaded,
    # /updates/latest.yml returns 404, which the auto-updater handles cleanly
    # (far better than the parked domain's 200 + HTML).
    location /updates/ {
        alias /var/www/acronix-updates/;
        autoindex off;
        # latest.yml must never be served stale or clients miss updates.
        location ~* \.(ya?ml)$ {
            add_header Cache-Control "no-cache";
        }
    }

    # Hashed Next assets are immutable — cache them hard.
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # trailingSlash: true in next.config, so routes are emitted as
    # path/index.html. Resolve clean URLs without per-route rules.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    # Security headers. HSTS is intentionally omitted here — certbot adds it
    # with the TLS block, so it is only sent over HTTPS.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # A marketing site needs no request body; keep it small.
    client_max_body_size 1m;
}
